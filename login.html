<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso | Selvin & Berly</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-emerald-900 flex items-center justify-center min-h-screen">

    <div class="bg-white p-10 rounded-3xl shadow-2xl w-full max-w-md reveal active">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-serif italic mb-2">Hola, chicos</h1>
            <p class="text-gray-500">Inicia sesión para subir un nuevo viaje.</p>
        </div>
        
        <form id="login-form" class="space-y-6">
            <div>
                <label class="block text-xs font-bold uppercase tracking-widest mb-2 text-gray-400">Usuario</label>
                <input type="text" id="username" required class="w-full p-4 bg-gray-50 border-none rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none">
            </div>
            <div>
                <label class="block text-xs font-bold uppercase tracking-widest mb-2 text-gray-400">Contraseña</label>
                <input type="password" id="password" required class="w-full p-4 bg-gray-50 border-none rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none">
            </div>
            <button type="submit" class="w-full bg-emerald-600 text-white py-4 rounded-xl font-bold hover:bg-emerald-700 transition shadow-lg shadow-emerald-200">ENTRAR AL PANEL</button>
            <a href="index.html" class="block text-center text-sm text-gray-400 mt-4">Volver al sitio público</a>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
