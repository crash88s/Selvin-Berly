<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selvin & Berly | Viajando Juntos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-stone-50 text-gray-900">

    <!-- Nav con Redes Sociales -->
    <nav class="fixed w-full z-50 bg-white/90 backdrop-blur-md border-b border-gray-100" id="main-nav">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="index.html" class="text-2xl font-bold tracking-tighter uppercase font-serif">Selvin <span class="text-emerald-600">&</span> Berly</a>
            
            <div class="hidden md:flex space-x-6 items-center">
                <div class="flex space-x-4 border-r pr-6 border-gray-200">
                    <a href="https://www.instagram.com/viajandojuntos_bys/" target="_blank" class="text-gray-400 hover:text-pink-600 transition"><i class="fab fa-instagram text-xl"></i></a>
                    <a href="https://www.youtube.com/@SelvinBerly" target="_blank" class="text-gray-400 hover:text-red-600 transition"><i class="fab fa-youtube text-xl"></i></a>
                    <a href="https://www.facebook.com/viajandojuntos.bys/" target="_blank" class="text-gray-400 hover:text-blue-600 transition"><i class="fab fa-facebook text-xl"></i></a>
                </div>
                <a href="login.html" id="admin-btn" class="text-xs font-bold tracking-widest uppercase bg-emerald-600 text-white px-4 py-2 rounded-full hover:bg-emerald-700 transition">Panel Admin</a>
            </div>
        </div>
    </nav>

    <!-- Hero Section con estilo de aventura -->
    <header class="relative h-[90vh] flex items-center justify-center overflow-hidden">
        <img src="https://images.unsplash.com/photo-1530789253388-582c481c54b0?auto=format&fit=crop&q=80&w=2070" class="absolute w-full h-full object-cover" alt="Selvin y Berly Hero">
        <div class="absolute inset-0 bg-gradient-to-b from-black/40 via-transparent to-stone-50"></div>
        <div class="relative text-center text-white px-4 reveal">
            <h1 class="text-6xl md:text-9xl mb-4 italic font-serif">Viajando Juntos</h1>
            <p class="text-lg md:text-2xl font-light max-w-2xl mx-auto opacity-90 tracking-wide">Explorando el mundo, un destino a la vez.</p>
        </div>
    </header>

    <!-- Travel Grid Dinámico -->
    <main class="max-w-7xl mx-auto px-6 py-20">
        <div class="flex justify-between items-end mb-12">
            <div>
                <h2 class="text-4xl font-serif italic">Nuestras Aventuras</h2>
                <div class="h-1 w-20 bg-emerald-600 mt-2"></div>
            </div>
        </div>
        
        <!-- Aquí se cargarán los posts desde JS -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12" id="travel-grid"></div>
    </main>

    <!-- Footer Pro -->
    <footer class="bg-white py-16 border-t border-gray-100 mt-20">
        <div class="max-w-7xl mx-auto px-6 text-center">
            <h3 class="text-3xl font-serif italic mb-6">Selvin & Berly</h3>
            <div class="flex justify-center space-x-8 mb-10">
                <a href="https://www.instagram.com/viajandojuntos_bys/" class="social-link-large"><i class="fab fa-instagram"></i></a>
                <a href="https://www.youtube.com/@SelvinBerly" class="social-link-large"><i class="fab fa-youtube"></i></a>
                <a href="https://www.facebook.com/viajandojuntos.bys/" class="social-link-large"><i class="fab fa-facebook"></i></a>
            </div>
            <p class="text-gray-400 text-sm tracking-widest uppercase">© <span id="year"></span> | Marcando ruta por el mundo</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
